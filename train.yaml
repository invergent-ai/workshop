# GRPO RL Training Example

model: ./workshop/model
output_dir: ./outputs

per_device_train_batch_size: 1
sequence_len: 4096

# max_steps = orchestrator steps (must match orch.yaml max_steps)
max_steps: 30
logging_steps: 1

learning_rate: 5e-5
lr_scheduler_type: constant
warmup_steps: 0
optimizer: adamw

recipe: bf16

lora: true
lora_rank: 16
lora_alpha: 32
lora_target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj


