model: Qwen/Qwen3-0.6B
output_dir: ./workshop/model

num_epochs: 2
eval_steps: 50
warmup_steps: 50

weight_decay: 0.01

per_device_train_batch_size: 2
gradient_accumulation_steps: 2

sample_packing: true
sequence_len: 4096

recipe: bf16

learning_rate: 2e-4

lora: true
lora_rank: 16
lora_alpha: 32
lora_target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj

dataloader_num_workers: 4

datasets:
  - path: "cetusian/markdown-table-qa"
    type: instruction
    instruction_field: instruction
    input_field: input
    output_field: response
    split: train

validation_datasets:
  - path: "cetusian/markdown-table-qa"
    type: instruction
    instruction_field: instruction
    input_field: input
    output_field: response
    split: validation
