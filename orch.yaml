# GRPO Orchestrator Example

model:
  name: ./workshop/model
  lora_adapter: "default"
  lora_rank: 16
  lora_alpha: 32

env:
  - id: markdown-table-qa

batch_size: 128
rollouts_per_example: 16
seq_len: 4096
max_steps: 30
use_token_client: false

sampling:
  max_tokens: 2048

client:
  base_url:
    - http://localhost:8002/v1
